      const taken = takenNamesSpec.has(p.name);
      const row = h("div",{style:{display:"grid",gridTemplateColumns:"28px 1fr 40px 44px 44px 50px",gap:"0",padding:"8px 12px",borderBottom:i<DRAFT_POOL.length-1?`1px solid ${C.border}11`:"none",opacity:taken?"0.3":"1"}});
      row.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},String(i+1)));
      const nc=h("div",{}); nc.appendChild(h("div",{style:{color:taken?C.muted:C.text,fontWeight:"600",fontSize:"12px",textDecoration:taken?"line-through":"none"}},p.name)); if(taken) nc.appendChild(h("div",{style:{color:C.red,fontSize:"10px",fontWeight:"700"}},"DRAFTED")); row.appendChild(nc);
      row.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},p.pos||"—"));
      row.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},p.team||"—"));
      row.appendChild(h("div",{style:{color:C.red,fontWeight:"700",fontSize:"12px",textAlign:"center"}},p.hrProj||"—"));
      row.appendChild(h("div",{style:{color:C.green,fontWeight:"700",fontSize:"12px",textAlign:"center"}},p.hbpProj||"—"));
      specPool.appendChild(row);
    });
    wrap.appendChild(specPool);
  }

  // ── Pick UI (only shown when it's your turn) ─────────────────────────────
  if(isMyTurn) {
    // Determine if this is the team's last pick and whether they have an HBP player yet
    const myPicksSoFar = (ds.picks||[]).filter(p=>p.teamId===S.draftMyTeamId);
    const myTotalPicks = ds.order.filter(o=>o.teamId===S.draftMyTeamId).length;
    const picksLeft = myTotalPicks - myPicksSoFar.length;
    const hasHBP = myPicksSoFar.some(p=>p.type==="hbp");
    const isLastPick = picksLeft === 1;
    const mustBeHBP = isLastPick && !hasHBP;
    const mustBeHR = hasHBP; // already have HBP — all remaining picks must be HR

    // Force correct type
    if(mustBeHBP && S.draftPickType !== "hbp") {
      S.draftPickType = "hbp";
    }
    if(mustBeHR && S.draftPickType !== "hr") {
      S.draftPickType = "hr";
    }

    if(S.draftConfirming) {
      // ── Floating modal overlay — renders over the page, no scroll needed ──
      const player = S.draftConfirming.player;

      const overlay = h("div",{style:{
        position:"fixed", inset:"0", zIndex:"1500",
        background:"rgba(13,35,64,0.7)", backdropFilter:"blur(3px)",
        display:"flex", alignItems:"center", justifyContent:"center", padding:"20px"
      }});
      // Clicking backdrop closes modal
      overlay.addEventListener("click", e => { if(e.target===overlay) set({draftConfirming:null}); });

      const modal = h("div",{style:{
        background:C.card, border:`2px solid ${mustBeHBP?C.green+"99":C.accent+"88"}`,
        borderRadius:"16px", padding:"24px", width:"100%", maxWidth:"360px",
        boxShadow:"0 20px 60px rgba(13,35,64,0.4)", animation:"fadeIn 0.15s ease"
      }});

      // Header row
      const mHdr = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}});
      mHdr.appendChild(h("div",{style:{color:C.accent,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em"}},"Confirm Pick"));
      mHdr.appendChild(h("button",{
        style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"20px",lineHeight:"1",padding:"0"},
        onClick:()=>set({draftConfirming:null})
      },"✕"));
      modal.appendChild(mHdr);

      // Type rule banners
      if(mustBeHBP) {
        modal.appendChild(h("div",{style:{
          background:C.green+"18", border:`1px solid ${C.green}44`,
          borderRadius:"8px", padding:"10px 12px", marginBottom:"14px",
          color:C.green, fontSize:"12px", fontWeight:"700"
        }},"🎯 Last pick — must be HBP."));
      }
      if(mustBeHR) {
        modal.appendChild(h("div",{style:{
          background:C.red+"18", border:`1px solid ${C.red}44`,
          borderRadius:"8px", padding:"10px 12px", marginBottom:"14px",
          color:C.red, fontSize:"12px", fontWeight:"700"
        }},"⚾ HBP already drafted — this pick must be HR."));
      }

      // Player info
      modal.appendChild(h("div",{style:{marginBottom:"18px"}},
        h("div",{style:{color:C.text,fontWeight:"800",fontSize:"20px",marginBottom:"2px"}},player.name),
        player.team ? h("div",{style:{color:C.muted,fontSize:"12px"}},player.team) : null
      ));

      // Type selector
      modal.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}},"Designate as:"));
      const typeRow = h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"20px"}});
      ["hr","hbp"].forEach(t => {
        const active = S.draftPickType === t;
        const color = t==="hr" ? C.red : C.green;
        const locked = mustBeHBP && t === "hr";
        const btn = h("button",{
          style:{padding:"14px 12px",borderRadius:"10px",cursor:locked?"not-allowed":"pointer",fontWeight:"700",fontSize:"14px",
            background:active?color+"22":C.surface,
            border:`2px solid ${active?color:locked?C.border:C.border}`,
            color:active?color:locked?C.border:C.muted,
            opacity:locked?"0.3":"1", transition:"all 0.12s"},
          onClick:()=>{ if(!locked) set({draftPickType:t}); }
        }, t==="hr" ? "⚾ HR Player" : "🎯 HBP Player");
        typeRow.appendChild(btn);
      });
      modal.appendChild(typeRow);

      // Lock In button
      modal.appendChild(h("button",{
        style:{width:"100%",padding:"14px",borderRadius:"10px",cursor:"pointer",fontWeight:"800",
          fontSize:"16px",background:C.accent,border:"none",color:"#ffffff",
          boxShadow:`0 4px 16px ${C.accent}44`},
        onClick:()=>commitPick(player, S.draftPickType)
      },"Lock In Pick ✓"));

      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      // Clean up overlay when draftConfirming clears (next render)
      const cleanOverlay = setInterval(()=>{ if(!S.draftConfirming){ overlay.remove(); clearInterval(cleanOverlay); }}, 100);

    } else {
      // Search UI
      const searchCard = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"16px",marginBottom:"16px"}});
      searchCard.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"10px"}},"Search for a player:"));

      let searchTimer = null;
      const srchInp = h("input",{style:{width:"100%",padding:"11px 14px",borderRadius:"8px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontSize:"16px",outline:"none",boxSizing:"border-box"}});
      srchInp.placeholder = "e.g. Aaron Judge";
      srchInp.value = S.draftSearch || "";
      // Use a closure-captured ref so focus is never lost on re-render
      const handleSearch = (val) => {
        S.draftSearch = val; // update silently without triggering full re-render
        clearTimeout(searchTimer);
        if(val.length > 1) {
          searchTimer = setTimeout(()=>searchDraftPlayers(val), 350);
        } else {
          set({draftSearchResults:[]});
        }
      };
      srchInp.addEventListener("input", e => handleSearch(e.target.value));
      searchCard.appendChild(srchInp);

      if(S.draftSearchLoading) {
        searchCard.appendChild(h("div",{style:{paddingTop:"12px"}},spinner("Searching…")));
      } else if(S.draftSearchResults.length > 0) {
        const resList = h("div",{style:{marginTop:"10px",display:"flex",flexDirection:"column",gap:"4px"}});
        S.draftSearchResults.forEach(player => {
          const row = h("div",{class:"row-hover",style:{
            padding:"10px 12px",borderRadius:"8px",background:C.bg,
            cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"
          },onClick:()=>set({draftConfirming:{player}, draftPickType:mustBeHBP?"hbp":mustBeHR?"hr":"hr"})});
          row.appendChild(h("div",{},
            h("div",{style:{color:C.text,fontWeight:"600",fontSize:"14px"}},player.name),
            h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"1px"}},`${player.team}${player.position?" · "+player.position:""}`)
          ));
          row.appendChild(h("span",{style:{color:C.accent,fontSize:"12px",fontWeight:"700"}},"Select →"));
          resList.appendChild(row);
        });
        searchCard.appendChild(resList);
      } else if(S.draftSearch.length > 1 && !S.draftSearchLoading) {
        searchCard.appendChild(h("div",{style:{color:C.muted,fontSize:"13px",paddingTop:"10px",textAlign:"center"}},"No active MLB players found."));
      }
      wrap.appendChild(searchCard);

      // Type rule banners on search screen
      if(mustBeHBP) {
        wrap.appendChild(h("div",{style:{
          background:C.green+"18", border:`1px solid ${C.green}44`,
          borderRadius:"10px", padding:"12px 14px", marginBottom:"12px",
          color:C.green, fontSize:"13px", fontWeight:"700"
        }},"🎯 Last pick — must be designated as HBP."));
      } else if(mustBeHR) {
        wrap.appendChild(h("div",{style:{
          background:C.red+"18", border:`1px solid ${C.red}44`,
          borderRadius:"10px", padding:"12px 14px", marginBottom:"12px",
          color:C.red, fontSize:"13px", fontWeight:"700"
        }},"⚾ HBP already drafted — remaining picks must be HR."));
      }

      // ── Projection Pool Table ─────────────────────────────────────────
      const takenNames = new Set((S.draftState?.picks||[]).map(p=>p.player.name));
      const poolCard = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",overflow:"hidden",marginBottom:"16px"}});
      const poolHdr = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",borderBottom:`1px solid ${C.border}`,background:C.surface}});
      poolHdr.appendChild(h("div",{style:{color:C.text,fontWeight:"700",fontSize:"13px"}},"📋 Top HR Projections"));
      // Pool search filter
      const poolFilterInp = h("input",{style:{padding:"5px 10px",borderRadius:"6px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontSize:"12px",outline:"none",width:"120px"}});
      poolFilterInp.placeholder = "Filter…";
      poolFilterInp.value = S.draftPoolFilter || "";
      poolFilterInp.addEventListener("input", e => { S.draftPoolFilter = e.target.value; renderPool(); });
      poolHdr.appendChild(poolFilterInp);
      poolCard.appendChild(poolHdr);

      // Column headers
      const poolColHdr = h("div",{style:{display:"grid",gridTemplateColumns:"28px 1fr 40px 44px 44px 50px",gap:"0",padding:"6px 12px",borderBottom:`1px solid ${C.border}22`,background:C.surface}});
      ["#","Player","Pos","Team","HR","HBP"].forEach((lbl,i) => {
        poolColHdr.appendChild(h("div",{style:{color:C.muted,fontSize:"10px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.06em",textAlign:i>3?"center":"left"}},lbl));
      });
      poolCard.appendChild(poolColHdr);

      const poolBody = h("div",{});
      poolCard.appendChild(poolBody);

      const renderPool = () => {
        poolBody.innerHTML = "";
        const filter = (S.draftPoolFilter||"").toLowerCase();
        const filtered = DRAFT_POOL.filter(p => !filter || p.name.toLowerCase().includes(filter) || p.team.toLowerCase().includes(filter) || p.pos.toLowerCase().includes(filter));
        filtered.forEach((p, i) => {
          const taken = takenNames.has(p.name);
          const row = h("div",{style:{
            display:"grid", gridTemplateColumns:"28px 1fr 40px 44px 44px 50px",
            gap:"0", padding:"9px 12px",
            borderBottom:i<filtered.length-1?`1px solid ${C.border}11`:"none",
            background:taken?"transparent":"transparent",
            opacity:taken?"0.35":"1",
            cursor:taken?"default":"pointer",
          }});
          if(!taken) {
            row.style.cursor = "pointer";
            row.addEventListener("click", () => set({draftConfirming:{player:{name:p.name, team:p.team+" ("+p.pos+")", id:null}}, draftPickType:mustBeHBP?"hbp":mustBeHR?"hr":"hr"}));
            row.addEventListener("mouseover", () => { row.style.background = C.surface; });
            row.addEventListener("mouseout", () => { row.style.background = "transparent"; });
          }
          row.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},String(i+1)));
          const nameCol = h("div",{});
          nameCol.appendChild(h("div",{style:{color:taken?C.muted:C.text,fontWeight:"600",fontSize:"12px",textDecoration:taken?"line-through":"none"}},p.name));
          if(taken) nameCol.appendChild(h("div",{style:{color:C.red,fontSize:"10px",fontWeight:"700"}},"DRAFTED"));
          row.appendChild(nameCol);
          row.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},(p.pos||"—")));
          row.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},(p.team||"—")));
          row.appendChild(h("div",{style:{color:C.red,fontWeight:"700",fontSize:"12px",textAlign:"center"}},(p.hrProj||"—")));
          row.appendChild(h("div",{style:{color:C.green,fontWeight:"700",fontSize:"12px",textAlign:"center"}},(p.hbpProj||"—")));
          poolBody.appendChild(row);
        });
        if(!filtered.length) poolBody.appendChild(h("div",{style:{color:C.muted,fontSize:"12px",padding:"14px",textAlign:"center"}},"No players match."));
      };
      renderPool();
      wrap.appendChild(poolCard);
    }
  }

  // ── My current picks this draft ──────────────────────────────────────────
  if(S.draftMyTeamId !== null) {
    const myPicks = (ds.picks||[]).filter(p=>p.teamId===S.draftMyTeamId);
    if(myPicks.length > 0) {
      wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}},`My Roster (${myPicks.length})`));
      const rList = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",overflow:"hidden",marginBottom:"16px"}});
      myPicks.forEach((p,i) => {
        const color = p.type==="hr" ? C.red : C.green;
        const row = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:i<myPicks.length-1?`1px solid ${C.border}22`:"none"}});
        row.appendChild(h("div",{},
          h("div",{style:{color:C.text,fontWeight:"600",fontSize:"13px"}},p.player.name),
          h("div",{style:{color:C.muted,fontSize:"10px",marginTop:"1px"}},`Round ${p.round}`)
        ));
        row.appendChild(h("span",{style:{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:"4px",padding:"2px 7px",fontSize:"10px",fontWeight:"700",textTransform:"uppercase"}},p.type.toUpperCase()));
        rList.appendChild(row);
      });
      wrap.appendChild(rList);
    }
  }

  // ── Full draft board ─────────────────────────────────────────────────────
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}},"Draft Board"));
  const boardCard = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",overflow:"hidden",marginBottom:"8px"}});
  const allPicks = ds.picks || [];
  // Group by round
  const rounds = [...new Set(ds.order.map(o=>o.round))];
  rounds.forEach((r,ri) => {
    const roundPicks = ds.order.filter(o=>o.round===r);
    const roundHdr = h("div",{style:{background:C.surface,padding:"6px 14px",borderBottom:`1px solid ${C.border}22`}});
    const isReverse = ds.format!=="linear" && r%2===0;
    roundHdr.appendChild(h("span",{style:{color:C.muted,fontSize:"10px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em"}},`Round ${r}${isReverse?" (reverse)":""}`));
    boardCard.appendChild(roundHdr);
    roundPicks.forEach((slot,si) => {
      const pick = allPicks.find(p=>p.pickIdx===ds.order.indexOf(slot));
      const team = S.teams.find(t=>t.id===slot.teamId);
      const isCurrentSlot = !pick && ds.order.indexOf(slot)===ds.currentPickIdx;
      const row = h("div",{style:{
        display:"flex",justifyContent:"space-between",alignItems:"center",
        padding:"9px 14px",
        borderBottom:(ri<rounds.length-1||si<roundPicks.length-1)?`1px solid ${C.border}11`:"none",
        background:isCurrentSlot?`${C.accent}11`:"transparent"
      }});
      const leftCol = h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
      leftCol.appendChild(h("span",{style:{color:C.muted,fontSize:"11px",minWidth:"22px",fontWeight:"600"}},`${ds.order.indexOf(slot)+1}.`));
      const teamInfo = h("div",{});
      teamInfo.appendChild(h("div",{style:{color:isCurrentSlot?C.accent:C.text,fontWeight:isCurrentSlot?"700":"500",fontSize:"12px"}},team?.name||"—"));
      leftCol.appendChild(teamInfo);
      row.appendChild(leftCol);
      if(pick) {
        const color = pick.type==="hr"?C.red:C.green;
        const right = h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
        right.appendChild(h("div",{style:{textAlign:"right"}},
          h("div",{style:{color:C.text,fontSize:"12px",fontWeight:"600"}},pick.player.name),
          pick.player.teamAbbr?h("div",{style:{color:C.muted,fontSize:"10px"}},pick.player.teamAbbr):null
        ));
        right.appendChild(h("span",{style:{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:"3px",padding:"1px 5px",fontSize:"9px",fontWeight:"700",textTransform:"uppercase"}},pick.type.toUpperCase()));
        row.appendChild(right);
      } else if(isCurrentSlot) {
        row.appendChild(h("span",{style:{color:C.accent,fontSize:"11px",fontWeight:"700",animation:"spin 1s linear infinite",display:"inline-block"}},"⏳"));
      } else {
        row.appendChild(h("span",{style:{color:C.border,fontSize:"11px"}},"–"));
      }
      boardCard.appendChild(row);
    });
  });
  wrap.appendChild(boardCard);
  return wrap;
}

// ── Draft Recap (post-draft) ──────────────────────────────────────────────────
function buildDraftRecap(ds, wrap) {
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},
    h("span",{style:{fontSize:"20px"}},"🎯"),
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Draft Complete")
  ));
  wrap.appendChild(h("div",{style:{background:`${C.green}11`,border:`1px solid ${C.green}33`,borderRadius:"10px",padding:"14px 16px",marginBottom:"20px",textAlign:"center"}},
    h("div",{style:{color:C.green,fontWeight:"800",fontSize:"16px",marginBottom:"4px"}},"✓ Draft is complete!"),
    h("div",{style:{color:C.muted,fontSize:"12px"}},"Rosters have been saved. Head to Standings to see your team.")
  ));
  // Show each team's picks
  S.teams.forEach(team => {
    const teamPicks = (ds.picks||[]).filter(p=>p.teamId===team.id).sort((a,b)=>a.round-b.round);
    if(!teamPicks.length) return;
    const card = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",overflow:"hidden",marginBottom:"10px"}});
    card.appendChild(h("div",{style:{background:C.surface,padding:"10px 14px",borderBottom:`1px solid ${C.border}`}},
      h("span",{style:{color:C.text,fontWeight:"700",fontSize:"13px"}},team.name),
      team.owner?h("span",{style:{color:C.muted,fontSize:"11px",marginLeft:"6px"}},team.owner):null
    ));
    teamPicks.forEach((p,i) => {
      const color = p.type==="hr"?C.red:C.green;
      const row = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",borderBottom:i<teamPicks.length-1?`1px solid ${C.border}22`:"none"}});
      row.appendChild(h("div",{},
        h("div",{style:{color:C.text,fontSize:"13px",fontWeight:"600"}},p.player.name),
        h("div",{style:{color:C.muted,fontSize:"10px",marginTop:"1px"}},`Rd ${p.round}${p.player.teamAbbr?" · "+p.player.teamAbbr:""}`)
      ));
      row.appendChild(h("span",{style:{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:"4px",padding:"2px 7px",fontSize:"10px",fontWeight:"700",textTransform:"uppercase"}},p.type.toUpperCase()));
      card.appendChild(row);
    });
    wrap.appendChild(card);
  });
  return wrap;
}



function buildLeagueSetup() {
  const wrap = h("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px"}});
  wrap.appendChild(h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:"48px",color:C.accent,letterSpacing:"0.05em",marginBottom:"8px",textAlign:"center"}},"⚾ DINGERS ONLY"));
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"14px",marginBottom:"40px",textAlign:"center"}},"Fantasy Baseball · Home Run League"));

  const card = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"28px",width:"100%",maxWidth:"400px"}});

  card.appendChild(h("div",{style:{color:C.text,fontWeight:"800",fontSize:"20px",marginBottom:"6px",textAlign:"center"}},"Create Your League"));
  card.appendChild(h("div",{style:{color:C.muted,fontSize:"13px",marginBottom:"24px",textAlign:"center"}},"Set up your league to get started"));

  // League name input
  card.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}},"League Name"));
  const nameInp = h("input",{style:{width:"100%",padding:"12px 14px",borderRadius:"8px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontSize:"16px",marginBottom:"20px",outline:"none"}});
  nameInp.placeholder = "e.g. Dingers Only 2026";
  nameInp.value = S.setupLeagueName || "";
  card.appendChild(nameInp);

  // Number of teams
  card.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"4px"}},"Number of Teams"));
  card.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginBottom:"8px"}},"You can adjust this later in the Commissioner Panel if needed."));
  const teamCountWrap = h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"20px"}});
  [2,4,6,8,10,12,14,16].forEach(n => {
    const btn = h("button",{
      style:{padding:"10px",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"14px",
        background: S.setupTeamCount===n ? `${C.accent}22` : C.bg,
        border: `1px solid ${S.setupTeamCount===n ? C.accent : C.border}`,
        color: S.setupTeamCount===n ? C.accent : C.muted},
      onClick: () => set({setupTeamCount: n})
    }, n);
    teamCountWrap.appendChild(btn);
  });
  card.appendChild(teamCountWrap);

  // Commissioner PIN
  card.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}},"Commissioner PIN"));
  const pinInp = h("input",{style:{width:"100%",padding:"12px 14px",borderRadius:"8px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontSize:"16px",marginBottom:"24px",outline:"none"}});
  pinInp.placeholder = "Choose a PIN for your league";
  pinInp.type = "password";
  pinInp.value = S.setupPIN || "";
  card.appendChild(pinInp);

  // Create button
  card.appendChild(h("button",{
    style:{width:"100%",padding:"14px",borderRadius:"10px",cursor:"pointer",fontWeight:"800",
      fontSize:"16px",background:C.accent,border:"none",color:"#ffffff"},
    onClick: async () => {
      const name = (nameInp.value||"").trim();
      const pin = (pinInp.value||"").trim();
      const count = S.setupTeamCount || 10;
      if(!name) { alert("Please enter a league name."); return; }
      if(!pin || pin.length < 4) { alert("Please choose a PIN (at least 4 characters)."); return; }

      // Build blank teams with random corny names
      const randomNames = getRandomTeamNames(count);
      const teams = Array.from({length: count}, (_,i) => ({
        id: i,
        name: randomNames[i],
        owner: "",
        hasUsedTransaction: false,
        players: [
          ...Array.from({length:7},(_,j)=>({name:"",type:"hr",effectiveHR:0,hrBaseline:null,addedAt:null,droppedAt:null,teamAbbr:null})),
          {name:"",type:"hbp",effectiveHBP:0,hbpBaseline:null,addedAt:null,droppedAt:null,teamAbbr:null}
        ]
      }));

      // Save to Firebase via createLeague so ownerUID is always stored
      if(S.currentUser) {
        const leagueId = await createLeague(name, count, S.currentUser.email, S.currentUser.uid);
        set({ leagueName: name.toUpperCase(), leagueSetup: true, leagueId,
              isCommish: true, commishUnlocked: true, onboardingStep: 1 });
      } else {
        // Fallback if somehow no auth user (shouldn't happen post-Option A)
        await setDoc(leagueRef, { teams, leagueName: name, lastUpdated: new Date().toISOString() });
        set({ leagueName: name, leagueSetup: true, teams });
      }
    }
  },"🚀 Create League"));

  wrap.appendChild(card);
  return wrap;
}


// ── Commissioner Onboarding Modal ─────────────────────────────────────────────
function buildOnboarding() {
  const steps = [
    {
      icon:"🎉",
      title:"Welcome, Commissioner!",
      body:`Your league is created. Here's your unique league URL — share it with owners when you're ready to invite them. You can always find it in Manage League → League Settings.`,
      extra: S.leagueId ? `${window.location.origin}${window.location.pathname}?league=${S.leagueId}` : null,
    },
    {
      icon:"✉️",
      title:"Invite Your Owners",
      body:"Go to Manage League → Invite Owners. Assign each team an email address, then hit the Invite button to send each owner a pre-filled email with your league link. When they sign up with that email, they're automatically assigned their team — no codes needed.",
    },
    {
      icon:"🎯",
      title:"Draft Day",
      body:"When everyone's signed in and ready, go to Manage League → League & Draft Setup. Pick your format (Snake or Linear), set the number of rounds, and start the live draft. Draft order is randomized automatically so no team has a first-pick advantage every year.",
    },
    {
      icon:"📊",
      title:"During the Season",
      body:"Stats refresh automatically whenever someone opens the app. Each team gets one transaction for the season — a player drop and add — processed through Manage League → Roster & Transactions. The dropped player's stats are frozen; the new player's stats count from the date they were added.",
    },
    {
      icon:"✅",
      title:"You're All Set",
      body:"That's the full picture. You can revisit these steps anytime via the ? button in the header. Good luck this season!",
    },
  ];

  const step = Math.max(0, Math.min(S.onboardingStep - 1, steps.length - 1));
  const current = steps[step];
  const isLast = step === steps.length - 1;

  const overlay = h("div",{style:{position:"fixed",inset:"0",background:"rgba(13,35,64,0.75)",backdropFilter:"blur(3px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",zIndex:"2000"}});
  const modal = h("div",{style:{background:C.card,border:`1px solid ${C.accent}44`,borderRadius:"16px",padding:"28px 24px",width:"100%",maxWidth:"400px",boxShadow:`0 20px 60px rgba(13,35,64,0.3)`,animation:"fadeIn 0.2s ease"}});

  // Progress dots
  const dots = h("div",{style:{display:"flex",gap:"6px",justifyContent:"center",marginBottom:"20px"}});
  steps.forEach((_,i) => dots.appendChild(h("div",{style:{width:"6px",height:"6px",borderRadius:"50%",background:i===step?C.accent:C.border,transition:"background 0.2s"}})));
  modal.appendChild(dots);

  modal.appendChild(h("div",{style:{fontSize:"32px",textAlign:"center",marginBottom:"12px"}},current.icon));
  modal.appendChild(h("div",{style:{color:C.text,fontWeight:"800",fontSize:"18px",textAlign:"center",marginBottom:"10px"}},current.title));
  modal.appendChild(h("div",{style:{color:C.muted,fontSize:"13px",lineHeight:"1.6",textAlign:"center",marginBottom:current.extra?"12px":"24px"}},current.body));

  if(current.extra) {
    const urlBox = h("div",{style:{background:C.bg,borderRadius:"8px",padding:"8px 12px",border:`1px solid ${C.border}`,marginBottom:"24px",display:"flex",gap:"8px",alignItems:"center"}});
    urlBox.appendChild(h("div",{style:{color:C.text,fontSize:"11px",flex:"1",wordBreak:"break-all",fontFamily:"monospace"}},current.extra));
    const cb = h("button",{style:{padding:"4px 10px",borderRadius:"5px",cursor:"pointer",fontWeight:"700",fontSize:"10px",background:`${C.accent}18`,border:`1px solid ${C.accent}44`,color:C.accent,whiteSpace:"nowrap"},
      onClick:()=>{navigator.clipboard?.writeText(current.extra);cb.textContent="✓";setTimeout(()=>{cb.textContent="Copy";},2000);}
    },"Copy");
    urlBox.appendChild(cb);
    modal.appendChild(urlBox);
  }

  // Nav buttons
  const btnRow = h("div",{style:{display:"flex",gap:"10px"}});
  if(step > 0) {
    btnRow.appendChild(h("button",{
      style:{flex:"1",padding:"11px",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"14px",background:"transparent",border:`1px solid ${C.border}`,color:C.muted},
      onClick:()=>set({onboardingStep:S.onboardingStep-1})
    },"← Back"));
  }
  btnRow.appendChild(h("button",{
    style:{flex:"2",padding:"11px",borderRadius:"8px",cursor:"pointer",fontWeight:"800",fontSize:"14px",background:C.accent,border:"none",color:"#fff"},
    onClick:()=>{ isLast ? set({onboardingStep:-1}) : set({onboardingStep:S.onboardingStep+1}); }
  }, isLast ? "Get Started ✓" : "Next →"));
  modal.appendChild(btnRow);

  overlay.appendChild(modal);
  return overlay;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML="";
  // Show auth screen if not signed in
  if(!S.currentUser) {
    return;
  }

  // Show league picker if signed in but no league selected
  if(S.authScreen === "finding_league") {
    // Still loading — show nothing (splash handles this)
    return document.createElement("div");
  }

  // Show league setup only if signed in but league doc not yet saved
  // (shouldn't happen after Option A — createLeague handles this during signup)
  if(!S.leagueSetup && S.teams.length === 0 && !S.currentUser) {
    app.appendChild(buildLeagueSetup());
    return;
  }
  // Signed in but league not loaded yet — show loading state
  if(S.currentUser && !S.leagueSetup) {
    app.appendChild(h("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}},
      h("div",{style:{color:C.muted,fontSize:"14px"}},"Loading your league…")
    ));
    return;
  }


  // Header
  const header=h("div",{style:{background:`linear-gradient(135deg,${C.surface} 0%,#d0d0d5 100%)`,borderBottom:`1px solid ${C.border}`,paddingTop:"max(env(safe-area-inset-top), 20px)",paddingBottom:"16px",paddingLeft:"20px",paddingRight:"20px"}});
  const hInner=h("div",{style:{maxWidth:"640px",margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"12px"}});
  const myTeamForHeader = S.myTeamId !== null ? S.teams.find(t=>t.id===S.myTeamId) : null;
  const titleBlock=h("div",{},
    h("div",{style:{fontFamily:"'Bebas Neue', sans-serif",fontSize:"38px",letterSpacing:"0.05em",color:C.accent,lineHeight:"1"}},`⚾ ${S.leagueName||"DINGERS ONLY"}`),
    myTeamForHeader
      ? h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"4px"}},
          h("div",{style:{background:C.accent,color:"#fff",fontWeight:"800",fontSize:"11px",padding:"3px 10px",borderRadius:"20px",letterSpacing:"0.06em"}},`⭐ ${myTeamForHeader.name}`),
          myTeamForHeader.owner ? h("div",{style:{color:C.muted,fontSize:"11px"}},myTeamForHeader.owner) : null
        )
      : h("div",{style:{color:C.muted,fontSize:"13px",letterSpacing:"0.15em",textTransform:"uppercase",marginTop:"2px"}},"Fantasy Baseball · 2026"),
    h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"10px"}},
      h("button",{style:{padding:"6px 14px",borderRadius:"6px",cursor:"pointer",fontWeight:"700",fontSize:"12px",background:`${C.accent}22`,border:`1px solid ${C.accent}55`,color:C.accent,opacity:S.refreshing?"0.6":"1"},onClick:refreshAllStats},S.refreshing?"⟳ Refreshing…":"⟳ Refresh Stats"),
      S.refreshStatus?h("span",{style:{color:C.green,fontSize:"12px"}},S.refreshStatus):S.lastUpdated?h("span",{style:{color:C.muted,fontSize:"11px"}},`Updated ${fmtTime(S.lastUpdated)}`):null
    )
  );
  const authBlock=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px"}});
  // User identity + actions
  const userEmail = S.currentUser?.email || "";
  const shortEmail = userEmail.length > 18 ? userEmail.substring(0,16)+"…" : userEmail;
  authBlock.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginBottom:"4px",textAlign:"right"}},shortEmail));
  const btnRow = h("div",{style:{display:"flex",gap:"6px",alignItems:"center"}});

  // Manage League — visible to all, PIN-protected
  if(!S.commishUnlocked) {
    const pwWrap = h("div",{style:{display:"flex",gap:"4px",alignItems:"center"}});
    const pwInp = h("input",{type:"password",placeholder:"Commissioner PIN",style:{background:C.bg,border:`1px solid ${S.pwError?C.red:C.border}`,borderRadius:"6px",padding:"5px 8px",color:C.text,fontSize:"12px",outline:"none",width:"130px"}});
    pwInp.addEventListener("keydown",e=>{if(e.key==="Enter")handleLogin(pwInp.value);});
    pwWrap.appendChild(pwInp);
    pwWrap.appendChild(h("button",{style:{padding:"5px 10px",borderRadius:"6px",cursor:"pointer",background:C.accent,border:"none",color:"#fff",fontWeight:"700",fontSize:"12px"},onClick:()=>handleLogin(pwInp.value)},"Go"));
    btnRow.appendChild(pwWrap);
  } else {
    btnRow.appendChild(h("button",{
      style:{padding:"7px 14px",borderRadius:"6px",cursor:"pointer",background:C.accent,border:"none",color:"#ffffff",fontWeight:"700",fontSize:"12px"},
      onClick:()=>set({showCommish:true,cpLocal:JSON.parse(JSON.stringify(S.teams)),cpActive:0})
    },"⚙️ Manage"));
    btnRow.appendChild(h("button",{
      style:{padding:"7px 10px",borderRadius:"6px",cursor:"pointer",background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontSize:"13px"},
      onClick:()=>set({onboardingStep:1})
    },"?"));
  }

  btnRow.appendChild(h("button",{
    style:{padding:"7px 12px",borderRadius:"6px",cursor:"pointer",background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontSize:"12px"},
    onClick:()=>{ if(confirm("Sign out?")) doSignOut(); }
  },"Sign Out"));
  authBlock.appendChild(btnRow);
  hInner.append(titleBlock,authBlock);
  header.appendChild(hInner);
  app.appendChild(header);

  // Tabs
  const myTeam = S.myTeamId !== null ? S.teams.find(t=>t.id===S.myTeamId) : null;
  const draftStatus = S.draftState?.status;
  const showDraftTab = draftStatus !== "complete"; // hide after draft ends
  const tabs=[
    ...(myTeam ? [{id:"myteam",label:"⭐ My Team"}] : []),
    {id:"standings",label:"🏆 Standings"},
    {id:"leaderboard",label:"📊 Leaderboard"},
    {id:"projected",label:"🔮 Projected"},
    {id:"scores",label:"⚾ Scores"},
    {id:"recent",label:"📅 Recent"},
    {id:"rules",label:"📖 Rules"},
    ...(showDraftTab ? [{id:"draft",label:"🎯 Draft"}] : []),
  ];
  const tabBar=h("div",{style:{borderBottom:`1px solid ${C.border}`,background:C.surface}});
  const tabInner=h("div",{style:{maxWidth:"640px",margin:"0 auto",display:"flex",padding:"0 16px",overflowX:"auto"}});
  tabs.forEach(tab=>{
    const active=S.tab===tab.id;
    tabInner.appendChild(h("button",{class:"tab-btn",style:{padding:"13px 16px",background:"none",border:"none",borderBottom:active?`2px solid ${C.accent}`:"2px solid transparent",color:active?C.accent:C.muted,fontWeight:active?"700":"500",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"},onClick:()=>set({tab:tab.id})},tab.label));
  });
  tabBar.appendChild(tabInner);
  app.appendChild(tabBar);

  // Body
  const body=h("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"24px 16px"}});
  if(S.tab==="standings") body.appendChild(buildStandings());
  else if(S.tab==="leaderboard") body.appendChild(buildLeaderboard());
  else if(S.tab==="projected") body.appendChild(buildProjected());

  else if(S.tab==="scores") body.appendChild(buildScores());
  else if(S.tab==="recent") body.appendChild(buildRecent());
  else if(S.tab==="rules") body.appendChild(buildRules());
  else if(S.tab==="debug") body.appendChild(buildDebug());
  else if(S.tab==="draft") {
    if(S.draftState?.status === "complete") {
      // Draft is done — redirect to standings
      S.tab = "standings";
      body.appendChild(buildStandings());
    } else {
      body.appendChild(buildDraft());
    }
  }
  else if(S.tab==="myteam") body.appendChild(buildMyTeam());
  app.appendChild(body);

  // Feedback button — fixed position, always visible
  const fbBtn = h("div",{style:{
    position:"fixed", bottom:"16px", right:"16px", zIndex:"500"
  }});
  fbBtn.appendChild(h("a",{
    href:`mailto:cdymc11@gmail.com?subject=${encodeURIComponent("Dingers Only Feedback")}&body=${encodeURIComponent("Hey Cody,\n\nHere's my feedback on Dingers Only:\n\n")}`,
    style:{
      display:"flex", alignItems:"center", gap:"6px",
      padding:"8px 14px", borderRadius:"20px",
      background:C.accent, color:"#fff",
      fontSize:"12px", fontWeight:"700",
      textDecoration:"none", boxShadow:`0 4px 12px ${C.accent}44`,
      opacity:"0.85"
    }
  },"💬 Feedback"));
  app.appendChild(fbBtn);

  if(S.selectedLogo !== null) app.appendChild(buildLogoModal());
  if(S.hrCelebration) app.appendChild(buildHRCelebration());
  if(S.selectedTeam) app.appendChild(buildTeamModal(S.selectedTeam));
  if(S.spotlightPlayer) app.appendChild(buildSpotlightModal());
  if(S.projectedTeam) app.appendChild(buildProjectedTeamModal());
  if(S.showCommish&&S.cpLocal) app.appendChild(buildCommish());
  if(S.onboardingStep > 0 && S.isCommish) app.appendChild(buildOnboarding());
}

const PASS = "beta";

function handleLogin(val) {
  const v = (val !== undefined ? val : S.commishInput).trim();
  if(v===PASS){ set({commishUnlocked:true,showCommish:true,pwError:false,cpLocal:JSON.parse(JSON.stringify(S.teams)),cpActive:0}); }
  else set({pwError:true, commishUnlocked:false});
}

// Load transactions first, THEN start listening to Firebase
// This ensures transactions are available when onSnapshot fires
// ── Auth state listener — drives the whole app startup ───────────────────────
// Simple approach: onAuthStateChanged just captures the user.
// A separate loadLeague() function handles all async league loading.
let _leagueLoaded = false;

function startLeagueListener(leagueId, user) {
  console.log("[D4] startLeagueListener called with:", leagueId);
  initFirebaseRefs(leagueId);
  setLeagueIdInUrl(leagueId);
  subscribeDraft();

  // Load transactions then start snapshot
  loadTransactions().then(() => {
    // Start live listener — commish check happens inside first snapshot
    onSnapshot(leagueRef, snap => {
      console.log("[D4] snapshot fired, exists:", snap.exists(), "ref path:", leagueRef?.path);
      if(!snap.exists()) { set({leagueSetup:false}); return; }
      const data = snap.data();
      // Determine commish — use passed user or fall back to S.currentUser
      const _u = user || S.currentUser;
      const isCommish = !!(
        (data.ownerUID && data.ownerUID === _u?.uid) ||
        (data.ownerEmail && data.ownerEmail?.toLowerCase() === _u?.email?.toLowerCase())
      );

      const merged = (data.teams||[]).map(t => ({...t, players:(t.players||[]).map(p=>({...p}))}));
      const withTx = applyTransactions(merged, S.transactions);
      const newDraftState = data.draftState || S.draftState || null;
      const newDraftCodes = data.draftCodes || S.draftCodes || null;
      const draftOnlyChange = (
        S.leagueSetup === true &&
        JSON.stringify(newDraftState) !== JSON.stringify(S.draftState) &&
        data.lastUpdated === S.lastUpdated
      );
      if(draftOnlyChange && S.tab === "draft") {
        S.draftState = newDraftState;
        S.draftCodes = newDraftCodes;
        render();
        return;
      }
      let autoMyTeamId = S.myTeamId;
      if(autoMyTeamId === null && S.currentUser?.email) {
        const matched = findTeamByEmail(withTx, S.currentUser.email);
        if(matched) {
          autoMyTeamId = matched.id;
          localStorage.setItem("draftTeamId", String(autoMyTeamId));
        }
      }
      set({
        teams: withTx,
        lastUpdated: data.lastUpdated||null,
        leagueName: data.leagueName || S.leagueName,
        seasonStartDate: data.seasonStartDate || null,
        leagueRules: data.leagueRules || null,
        leagueSettings: data.leagueSettings || null,
        leagueSetup: true,
        isCommish,
        commishUnlocked: isCommish,
        draftState: newDraftState,
        draftCodes: newDraftCodes,
        myTeamId: autoMyTeamId !== null ? autoMyTeamId : S.myTeamId,
        draftMyTeamId: autoMyTeamId !== null ? autoMyTeamId : S.draftMyTeamId,
      });
    });
  });
}

async function loadLeague(user) {
  if(_leagueLoaded) return;
  _leagueLoaded = true;

  let leagueId = getLeagueIdFromUrl() || localStorage.getItem("lastLeagueId");

  if(!leagueId) {
    // Search for user's league
    set({authScreen:"finding_league", authLoading:true});
    try {
      const allSnap = await getDocs(collection(db, "leagues"));
      const found = [];
      allSnap.forEach(d => {
        const data = d.data();
        if(
          data.ownerUID === user.uid ||
          data.ownerEmail?.toLowerCase() === user.email?.toLowerCase() ||
          (data.teams||[]).some(t => t.email?.toLowerCase() === user.email?.toLowerCase())
        ) found.push({id:d.id, name:data.leagueName||d.id});
      });

      if(found.length === 1) {
        leagueId = found[0].id;
      } else if(found.length > 1) {
        window.location.href = "index.html"; return;
      } else {
        window.location.href = "index.html"; return;
      }
    } catch(e) {
      console.error("Error finding league:", e); window.location.href = "index.html"; return;
    }
  }

  console.log("[D4] loadLeague found leagueId:", leagueId);
  set({leagueId, authLoading:false});
  startLeagueListener(leagueId, user);
}

onAuthStateChanged(auth, (user) => {
  if(!user) {
    window.location.href = "index.html";
    return;
  }
  S.currentUser = user;
  set({currentUser:user});
  if(!_leagueLoaded) loadLeague(user);
});


const _splash = document.getElementById("splash-screen");
if(_splash) {
  setTimeout(() => {
    _splash.classList.add("fade-out");
    setTimeout(() => { if(_splash.parentNode) _splash.parentNode.removeChild(_splash); }, 600);
  }, 1900);
}
