<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Dingers Only"/>

  <title>Dingers Only — App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f5f5f7; font-family: 'DM Sans', sans-serif; color: #0d2340; }
    #app { min-height: 100vh; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    input { font-family: 'DM Sans', sans-serif; }
    button { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f5f5f7; }
    ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 3px; }
    input::placeholder { color: #6b7fa3; }
    .tab-btn { transition: all 0.15s; }
    .row-hover:hover { background: rgba(28,63,110,0.06) !important; }
    @keyframes celebFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    @keyframes celebPop {
      0%   { transform: scale(0.4) translateY(20px); opacity: 0; }
      60%  { transform: scale(1.15) translateY(-8px); opacity: 1; }
      100% { transform: scale(1) translateY(0);      opacity: 1; }
    }
    @keyframes celebFadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    #splash-screen {
      position: fixed; inset: 0; background: #080c12;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s ease;
    }
    #splash-screen.fade-out { opacity: 0; pointer-events: none; }
    .splash-title {
      text-align: center;
      animation: splashUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    }
    @keyframes splashUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .splash-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px; letter-spacing: 0.06em;
      color: #e8c84a; line-height: 1;
    }
    .splash-sub {
      font-size: 13px; letter-spacing: 0.25em;
      text-transform: uppercase; color: #6b7fa3;
      margin-top: 6px;
    }
    .splash-batter {
      margin-top: 20px;
      animation: splashBatterIn 0.5s ease 0.8s both;
    }
    @keyframes splashBatterIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    </style>
</head>

      id: t.id,
      name: t.name,

      score: score(t),
    })).sort((a,b) => b.score - a.score);

    return true;

    return false;
  }
}

async function fetchStats(name) {
  try {
    let playerId = PLAYER_IDS[name] || null;
    if (!playerId) {
      const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(name)}&sportId=1`);
      if (!r.ok) return null;
      const d = await r.json();
      const person = d.people?.[0]; if(!person) return null;
      playerId = person.id;
    }
    const season = new Date().getFullYear();
    const r2 = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`);
    if (!r2.ok) return { hr: 0, hbp: 0, playerId, teamAbbr: null };
    const d2 = await r2.json();
    const split = d2.stats?.[0]?.splits?.[0];
    // No splits = player found but no stats yet (0 games played) — return zeros
    return { hr: split?.stat?.homeRuns??0, hbp: split?.stat?.hitByPitch??0, playerId, teamAbbr: split?.team?.abbreviation??null };
  } catch { return null; }
}

async function fetchYesterday(playerId) {
  try {
    const y = new Date(); y.setDate(y.getDate()-1);
    const ds = y.toISOString().split("T")[0];
    const season = new Date().getFullYear();
    const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${ds}&endDate=${ds}&sportId=1`);
    const d = await r.json();
    const stat = d.stats?.[0]?.splits?.[0]?.stat; if(!stat) return null;
    return { hr: stat.homeRuns??0, hbp: stat.hitByPitch??0 };
  } catch { return null; }
}

// Apply transactions on top of teams — pure function, no Firebase calls
function applyTransactions(teams, transactions) {
  const result = JSON.parse(JSON.stringify(teams));
  transactions.forEach(tx => {
    const team = result.find(t => t.id === tx.teamId);
    if(!team) return;
    // Mark dropped player — keep their stats, just flag as dropped
    const dropped = team.players.find(p => p.name === tx.droppedPlayer);
    if(dropped) {
      dropped.droppedAt = tx.droppedAt || "2026-01-01";
      // Do NOT zero stats — their accumulated HRs/HBPs count toward team score
    }
    // Add transaction player if not already present
    const exists = team.players.find(p => p.name === tx.addedPlayer);
    if(!exists) {
      team.players.push({
        name: tx.addedPlayer,
        type: tx.type || "hr",
        addedAt: tx.addedAt,
        droppedAt: null,
        hrBaseline: tx.hrBaseline ?? null,
        hbpBaseline: tx.hbpBaseline ?? null,
        effectiveHR: tx.effectiveHR || 0,
        effectiveHBP: tx.effectiveHBP || 0,
        teamAbbr: tx.teamAbbr || null,
      });
    } else {
      // Update existing with transaction data
      exists.addedAt = tx.addedAt;
      exists.hrBaseline = tx.hrBaseline ?? exists.hrBaseline;
      exists.hbpBaseline = tx.hbpBaseline ?? exists.hbpBaseline;
    }
    team.hasUsedTransaction = true;
  });
  return result;
}

async function saveToFirebase(teams) {
  if(!leagueRef) { console.warn("saveToFirebase called before leagueRef initialized"); return; }
  const now = new Date().toISOString();
  // Save teams as-is — strip transaction-added players (those live in transactions/ collection)
  // A transaction-added player has addedAt set; original roster players do not
  const transactionAddedNames = new Set(S.transactions.map(tx => tx.addedPlayer));
  const corrected = teams.map(t => {
    const players = (t.players || [])
      .filter(p => !transactionAddedNames.has(p.name)) // strip transaction pickups
      .map(p => ({
        name: p.name,
        type: p.type,
        teamAbbr: p.teamAbbr || null,
        effectiveHR: p.effectiveHR || 0,
        effectiveHBP: p.effectiveHBP || 0,
        hrBaseline: p.hrBaseline || null,
        hbpBaseline: p.hbpBaseline || null,
        addedAt: p.addedAt || null,
        droppedAt: p.droppedAt || null,
      }));
    return { ...t, players };
  });
  await setDoc(leagueRef, {
    teams: corrected,
    lastUpdated: now,
    leagueName: S.leagueName,
  }, { merge: true });
}

// ── MLB Stats refresh ─────────────────────────────────────────────────────────
async function refreshAllStats() {
  set({ refreshing: true, refreshStatus: "Fetching stats…" });

  // Check if start date baseline needs to be set
  const today = new Date().toISOString().split("T")[0];
  const startDate = S.seasonStartDate;
  const needsBaseline = startDate && startDate <= today;

  // Work from current live teams in S.teams — deep copy so we don't mutate state
  const updated = JSON.parse(JSON.stringify(S.teams));
  const txUpdates = {};

  // Build set of dropped player names per team
  const droppedByTeam = {};
  S.transactions.forEach(tx => {
    if(!droppedByTeam[tx.teamId]) droppedByTeam[tx.teamId] = new Set();
    droppedByTeam[tx.teamId].add(tx.droppedPlayer);
  });

  // Build set of transaction-added players (stats handled separately below)
  const txAddedNames = new Set(S.transactions.map(tx => tx.addedPlayer));

  for(const t of updated) {
    for(const p of t.players) {
      if(!p.name?.trim()) continue;
      // Skip transaction pickups — handled separately
      if(txAddedNames.has(p.name)) continue;
      // Skip dropped players — their stats are frozen
      if(droppedByTeam[t.id]?.has(p.name)) continue;
      const s = await fetchStats(p.name); if(!s) continue;
      if(p.type==="hr") {
        if(needsBaseline && p.hrBaseline === null) {
          // First refresh on/after start date — lock in baseline
          p.hrBaseline = s.hr;
          p.effectiveHR = 0;
        } else if(needsBaseline && p.hrBaseline !== null) {
          p.effectiveHR = Math.max(0, s.hr - p.hrBaseline);
        } else {
          p.effectiveHR = s.hr;
        }
      }
      if(p.type==="hbp") {
        if(needsBaseline && p.hbpBaseline === null) {
          p.hbpBaseline = s.hbp;
          p.effectiveHBP = 0;
        } else if(needsBaseline && p.hbpBaseline !== null) {
          p.effectiveHBP = Math.max(0, s.hbp - p.hbpBaseline);
        } else {
          p.effectiveHBP = s.hbp;
        }
      }
      if(s.teamAbbr) p.teamAbbr = s.teamAbbr;
    }
  }

  // Update transaction player stats using stored baselines
  for(const tx of S.transactions) {
    const s = await fetchStats(tx.addedPlayer); if(!s) continue;
    const txId = `${tx.teamId}_${tx.addedPlayer.replace(/[^a-zA-Z0-9]/g,'_')}`;
    if(tx.type === "hr") {
      const baseline = tx.hrBaseline ?? s.hr;
      txUpdates[txId] = { effectiveHR: Math.max(0, s.hr - baseline), teamAbbr: s.teamAbbr };
    }
    if(tx.type === "hbp") {
      const baseline = tx.hbpBaseline ?? s.hbp;
      txUpdates[txId] = { effectiveHBP: Math.max(0, s.hbp - baseline), teamAbbr: s.teamAbbr };
    }
  }

  // Save updated base roster stats
  await saveToFirebase(updated);

  // Save updated transaction player stats back to their docs
  for(const [txId, vals] of Object.entries(txUpdates)) {
    const tx = S.transactions.find(t => `${t.teamId}_${t.addedPlayer.replace(/[^a-zA-Z0-9]/g,'_')}` === txId);
    if(tx) {
      await setDoc(doc(db, "transactions", txId), { ...tx, ...vals, savedAt: new Date().toISOString() });
    }
  }

  // Reload transactions and reapply to get final merged view
  const txs = await loadTransactions();
  const withTx = applyTransactions(updated, txs);
  set({ teams: withTx, refreshing: false, refreshStatus: "✓ Updated!" });
  setTimeout(()=>set({refreshStatus:""}), 3000);
}

function h(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") e.className=v;
    else if(k==="disabled"){ if(v) e.disabled=true; }
    else e.setAttribute(k,v);
  }
  for(const c of children) {
    if(c==null||c===false) continue;
    if(c instanceof Node) e.appendChild(c);
    else e.appendChild(document.createTextNode(String(c)));
  }
  return e;
}

// ── Rank info builder (tie-aware) ─────────────────────────────────────────────
function buildRankInfo(scores) {
  const n = scores.length;
  const result = scores.map(() => ({ icon: "", isSpecial: false }));
  if(n === 0) return result;
  const distinct = [...new Set(scores)].sort((a,b)=>b-a);
  const highest = distinct[0];
  // Get loser positions from settings (1-indexed), default to last place only
  const loserPositions = S.leagueSettings?.loserPositions || [n];
  scores.forEach((s, i) => {
    const rank1 = distinct.indexOf(s) + 1; // 1-indexed rank
    if(s === highest) {
      result[i] = { icon: "🥇", isSpecial: true };
    } else if(loserPositions.includes(rank1)) {
      result[i] = { icon: "💀", isSpecial: true };
    } else {
      result[i] = { icon: `#${rank1}`, isSpecial: false };
    }
  });
  return result;
}

async function loadYesterday() {
  set({ydLoading:true,ydDone:false,ydResults:null});
  const hits=[];
  for(const team of S.teams) {
    for(const p of (team.players||[])) {
      if(!p.name?.trim()) continue;
      if(p.droppedAt) continue; // skip dropped players
      const s = await fetchStats(p.name); if(!s?.playerId) continue;
      const y = await fetchYesterday(s.playerId); if(!y) continue;
      if(p.type==="hr"&&y.hr>0) hits.push({name:p.name,teamAbbr:s.teamAbbr,fantasyTeam:team.name,stat:y.hr,type:"hr"});
      if(p.type==="hbp"&&y.hbp>0) hits.push({name:p.name,teamAbbr:s.teamAbbr,fantasyTeam:team.name,stat:y.hbp,type:"hbp"});
    }
  }
  hits.sort((a,b)=>b.stat-a.stat);
  set({ydLoading:false,ydDone:true,ydResults:hits});
}

async function loadWeeklyRecap(startDate, endDate) {
  set({wkLoading:true,wkDone:false,wkResults:null});
  const season = new Date().getFullYear();
  const teamWeeks = S.teams.map(t=>({id:t.id, name:t.name, hr:0, hbp:0, pts:0}));
  const allPlayers = [];
  try {
    for(const ft of S.teams) {
      const tw = teamWeeks.find(t=>t.id===ft.id);
      for(const p of (ft.players||[])) {
        if(!p.name?.trim()) continue;
        const playerId = PLAYER_IDS[p.name]; if(!playerId) continue;
        try {
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${startDate}&endDate=${endDate}&sportId=1`);
          if(!r.ok) continue;
          const d = await r.json();
          const splits = d.stats?.[0]?.splits||[];
          let hr=0,hbp=0;
          splits.forEach(s=>{ hr+=s.stat?.homeRuns??0; hbp+=s.stat?.hitByPitch??0; });
          const pts = p.type==="hr"?hr:hbp;
          if(p.type==="hr") tw.hr+=hr;
          if(p.type==="hbp") tw.hbp+=hbp;
          tw.pts+=pts;
          allPlayers.push({name:p.name,fantasyTeam:ft.name,type:p.type,pts,hr,hbp});
        } catch(e){continue;}
      }
    }
    const hrPlayers = allPlayers.filter(p=>p.type==="hr").sort((a,b)=>b.pts-a.pts);
    const hbpPlayers = allPlayers.filter(p=>p.type==="hbp").sort((a,b)=>b.pts-a.pts);
    const topTeam = [...teamWeeks].sort((a,b)=>b.pts-a.pts)[0];
    set({wkLoading:false,wkDone:true,wkResults:{
      teamWeeks, allPlayers,
      topHR: hrPlayers[0]?{name:hrPlayers[0].name,val:hrPlayers[0].pts}:null,
      topHBP: hbpPlayers[0]?{name:hbpPlayers[0].name,val:hbpPlayers[0].pts}:null,
      teamOfWeek: topTeam?{name:topTeam.name,pts:topTeam.pts}:null,
    }});
  } catch(e) {
    set({wkLoading:false,wkDone:true,wkResults:null});
  }
}

function buildProjected() {
  const TOTAL_GAMES = 162;
  const seasonStart = new Date("2026-03-26");
  const today = new Date();
  const daysPassed = Math.max(1, Math.floor((today - seasonStart) / (1000*60*60*24)));
  const gamesPlayed = Math.min(Math.round(daysPassed * 0.92), TOTAL_GAMES);
  const gamesRemaining = TOTAL_GAMES - gamesPlayed;
  // Weight: how much to trust actual pace vs preseason projection
  // Starts at 0.1 (10% pace, 90% preseason), reaches 0.9 by game 145
  const paceWeight = Math.min(0.9, gamesPlayed / TOTAL_GAMES * 1.6);
  const projWeight = 1 - paceWeight;

  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},
    h("span",{style:{fontSize:"20px"}},"🔮"),
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Projected Final Rankings")
  ));
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"20px"}},"Blends preseason Steamer projections with current pace. Tap a team to see player breakdown."));

  const projTeams = S.teams.map(team => {
    const currentScore = score(team);
    let projectedScore = currentScore;

    (team.players||[]).forEach(p => {
      if(!p.name?.trim()) return;
      const preseason = p.type === "hbp"
      ? (PRESEASON_HBP_PROJ[p.name] ?? null)
      : (PRESEASON_PROJ[p.name] ?? null);
      const actual = p.type==="hr" ? (p.effectiveHR||0) : (p.effectiveHBP||0);

      // For transaction players, use full season stats for pace (not just since addedAt)
      const baseline = p.addedAt ? (p.type==="hr" ? (p.hrBaseline||0) : (p.hbpBaseline||0)) : 0;
      const totalSeasonStats = actual + baseline; // full season HR/HBP total

      if(preseason === null) {
        const rate = totalSeasonStats / Math.max(gamesPlayed, 1);
        projectedScore += rate * gamesRemaining;
      } else {
        // Blended projection of full season total
        const paceRate = totalSeasonStats / Math.max(gamesPlayed, 1);
        const paceRemaining = paceRate * gamesRemaining;
        const preseasonRate = preseason / TOTAL_GAMES;
        const preseasonRemaining = preseasonRate * gamesRemaining;
        const projSeasonTotal = totalSeasonStats + (paceWeight * paceRemaining) + (projWeight * preseasonRemaining);
        // Team contribution remaining = projected season total minus baseline minus already scored
        projectedScore += projSeasonTotal - totalSeasonStats - baseline;
      }
    });

    const projRemaining = Math.round(projectedScore - currentScore);
    return { ...team, currentScore, gamesPlayed, gamesRemaining, projectedScore: Math.round(projectedScore), projRemaining };
  });

  const sorted = [...projTeams].sort((a,b)=>b.projectedScore-a.projectedScore);
  const maxProj = Math.max(...sorted.map(t=>t.projectedScore),1);
  const projRankInfo = buildRankInfo(sorted.map(t=>t.projectedScore));
  function rankIcon(i) { return projRankInfo[i].icon; }
  function rankSize(i) { return projRankInfo[i].isSpecial ? "20px" : "14px"; }

  // Season progress bar
  const progressPct = Math.round((gamesPlayed/TOTAL_GAMES)*100);
  const blendLabel = `${Math.round(projWeight*100)}% preseason · ${Math.round(paceWeight*100)}% pace`;
  wrap.appendChild(h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"12px 16px",marginBottom:"20px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:C.muted,marginBottom:"6px"}},
      h("span",{},`Game ${gamesPlayed} of ${TOTAL_GAMES}`),
      h("span",{},blendLabel)
    ),
    h("div",{style:{height:"4px",background:C.bg,borderRadius:"2px",overflow:"hidden"}},
      h("div",{style:{height:"100%",width:`${progressPct}%`,background:`linear-gradient(90deg,${C.accent},${C.red})`,borderRadius:"2px"}})
    )
  ));

  sorted.forEach((team,i)=>{
    const pct = (team.projectedScore/maxProj)*100;
    const isFirst = projRankInfo[i].icon === "🥇";
    const card = h("div",{class:"row-hover",style:{background:C.card,border:`1px solid ${isFirst?C.accent+"55":C.border}`,borderRadius:"12px",padding:"14px 18px",marginBottom:"10px",boxShadow:isFirst?`0 0 20px ${C.accent}18`:"none",cursor:"pointer"},onClick:()=>set({projectedTeam:{team, gamesPlayed, gamesRemaining, paceWeight, projWeight}})});
    const topRow = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
    topRow.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
      h("span",{style:{fontSize:rankSize(i),fontWeight:"700",color:C.muted,minWidth:"28px"}},rankIcon(i)),
      h("div",{},
        h("div",{style:{color:C.text,fontWeight:"700",fontSize:"15px"}},team.name),
        h("div",{style:{color:C.muted,fontSize:"11px"}},team.owner||"")
      )
    ));
    const rightCol = h("div",{style:{textAlign:"right"}});
    rightCol.appendChild(h("div",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"28px",fontWeight:"800",lineHeight:"1"}},team.projectedScore));
    rightCol.appendChild(h("div",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},"proj pts"));
    topRow.appendChild(rightCol);
    card.appendChild(topRow);
    const barWrap = h("div",{style:{height:"4px",background:C.bg,borderRadius:"2px",overflow:"hidden",marginBottom:"8px"}});
    barWrap.appendChild(h("div",{style:{height:"100%",width:`${pct}%`,background:i===0?`linear-gradient(90deg,${C.accent},${C.red})`:`${C.accent}55`,borderRadius:"2px",transition:"width 0.6s ease"}}));
    card.appendChild(barWrap);
    card.appendChild(h("div",{style:{display:"flex",gap:"16px",fontSize:"11px",color:C.muted}},
      h("span",{},`Now: ${team.currentScore} pts`),
      h("span",{},`+${team.projRemaining} projected`),
      h("span",{},`${team.gamesRemaining} games left`)
    ));
    wrap.appendChild(card);
  });

  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"8px",textAlign:"center",lineHeight:"1.6"}},
    "Steamer 2026 preseason projections · Refresh Stats for latest actuals"
  ));
  return wrap;
}

function buildScores() {
  const today = new Date();
  const dateLabel = today.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  // Build set of all drafted teamAbbrs
  const draftedAbbrs = new Set();
  S.teams.forEach(ft => {
    const hcTeam = HARDCODED_TEAMS.find(h => h.id === ft.id);
    (ft.players||[]).forEach((p,i) => {
      const abbr = p.teamAbbr || hcTeam?.players?.[i]?.teamAbbr || null;
      if(abbr) draftedAbbrs.add(abbr);
    });
  });

  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},
    h("span",{style:{fontSize:"20px"}},"⚾"),
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Today's Scores")
  ));
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"4px"}},dateLabel));
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginBottom:"20px"}},"🌟 = has drafted players · When games show Final, wait 1-2 hours then refresh stats!"));

  if(!S.scDone && !S.scLoading) {
    wrap.appendChild(h("button",{style:{padding:"12px 28px",borderRadius:"8px",cursor:"pointer",background:C.accent,border:"none",color:"#ffffff",fontWeight:"700",fontSize:"14px"},onClick:loadScores},"Load Today's Scores"));
    return wrap;
  }
  if(S.scLoading) { wrap.appendChild(spinner("Loading scores…")); return wrap; }
  if(!S.scResults || S.scResults.length === 0) {
    wrap.appendChild(h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"28px",textAlign:"center"}},
      h("div",{style:{fontSize:"32px",marginBottom:"8px"}},"😴"),
      h("div",{style:{color:C.text,fontSize:"16px",fontWeight:"700"}},"No Games Today")
    ));
  } else {
    const list = h("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
    S.scResults.forEach(game => {
      const hasDrafted = draftedAbbrs.has(game.awayAbbr) || draftedAbbrs.has(game.homeAbbr);
      const isFinal = ["Final","Game Over","Completed Early","Completed"].some(s => game.status?.includes(s));
      const isLive = ["In Progress","Warmup","Pre-Game"].some(s => game.status?.includes(s)) || game.status === "Live";
      const statusColor = isFinal ? C.muted : isLive ? C.green : C.muted;
      const card = h("div",{style:{
        background: C.card,
        border: `1px solid ${hasDrafted ? C.accent+"55" : C.border}`,
        borderRadius:"10px",
        padding:"12px 16px",
        boxShadow: hasDrafted ? `0 0 12px ${C.accent}15` : "none"
      }});

      const top = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
      // Star + status
      const statusEl = h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
      if(hasDrafted) statusEl.appendChild(h("span",{style:{fontSize:"14px"}},"🌟"));
      statusEl.appendChild(h("span",{style:{color:statusColor,fontSize:"11px",fontWeight:"700",textTransform:"uppercase"}},
        isLive ? `🔴 ${game.inning || game.status}` : game.status
      ));
      if(isFinal) statusEl.appendChild(h("span",{style:{color:C.muted,fontSize:"10px",marginLeft:"6px"}},"· refresh stats in 1-2 hrs"));
      top.appendChild(statusEl);
      // Game time if not started
      if(!isFinal && !isLive && game.gameTime) {
        top.appendChild(h("span",{style:{color:C.muted,fontSize:"11px"}},game.gameTime));
      }
      card.appendChild(top);

      // Teams + scores
      const matchup = h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:"8px"}});

      // Away team
      const awayHasDrafted = draftedAbbrs.has(game.awayAbbr);
      const awayEl = h("div",{style:{textAlign:"left"}});
      awayEl.appendChild(h("div",{style:{color:awayHasDrafted?C.accent:C.text,fontWeight:awayHasDrafted?"800":"600",fontSize:"16px"}},game.awayAbbr));
      awayEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"2px"}},game.awayName));
      matchup.appendChild(awayEl);

      // Score or vs
      const scoreEl = h("div",{style:{textAlign:"center"}});
      if(isFinal || isLive) {
        scoreEl.appendChild(h("div",{style:{color:C.text,fontFamily:"'Bebas Neue', sans-serif",fontSize:"24px",fontWeight:"800",lineHeight:"1"}},
          `${game.awayScore} - ${game.homeScore}`
        ));
      } else {
        scoreEl.appendChild(h("div",{style:{color:C.muted,fontSize:"16px",fontWeight:"700"}},"vs"));
      }
      matchup.appendChild(scoreEl);

      // Home team
      const homeHasDrafted = draftedAbbrs.has(game.homeAbbr);
      const homeEl = h("div",{style:{textAlign:"right"}});
      homeEl.appendChild(h("div",{style:{color:homeHasDrafted?C.accent:C.text,fontWeight:homeHasDrafted?"800":"600",fontSize:"16px"}},game.homeAbbr));
      homeEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"2px"}},game.homeName));
      matchup.appendChild(homeEl);
      card.appendChild(matchup);

      // Show which drafted players are in this game — split by away/home
      if(hasDrafted) {
        const awayPlayers = [], homePlayers = [];
        S.teams.forEach(ft => {
          const hcTeam = HARDCODED_TEAMS.find(hc => hc.id === ft.id);
          (ft.players||[]).forEach((p,i) => {
            if(p.droppedAt) return; // skip dropped players
            const abbr = p.teamAbbr || hcTeam?.players?.[i]?.teamAbbr || null;
            if(abbr === game.awayAbbr) awayPlayers.push({name:p.name, fantasy:ft.name});
            else if(abbr === game.homeAbbr) homePlayers.push({name:p.name, fantasy:ft.name});
          });
        });
        if(awayPlayers.length > 0 || homePlayers.length > 0) {
          const row = h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginTop:"10px",paddingTop:"8px",borderTop:`1px solid ${C.border}33`}});
          // Away column — left aligned
          const awayCol = h("div",{style:{display:"flex",flexDirection:"column",gap:"4px"}});
          awayPlayers.forEach(p => {
            const wrap = h("div",{});
            wrap.appendChild(h("div",{style:{color:C.text,fontSize:"11px",fontWeight:"600",lineHeight:"1.3"}},p.name));
            wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"10px"}},p.fantasy));
            awayCol.appendChild(wrap);
          });
          // Home column — right aligned
          const homeCol = h("div",{style:{display:"flex",flexDirection:"column",gap:"4px",alignItems:"flex-end",textAlign:"right"}});
          homePlayers.forEach(p => {
            const wrap = h("div",{});
            wrap.appendChild(h("div",{style:{color:C.text,fontSize:"11px",fontWeight:"600",lineHeight:"1.3"}},p.name));
            wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"10px"}},p.fantasy));
            homeCol.appendChild(wrap);
          });
          row.append(awayCol, homeCol);
          card.appendChild(row);
        }
      }
      list.appendChild(card);
    });
    wrap.appendChild(list);
  }

  wrap.appendChild(h("button",{style:{width:"100%",marginTop:"16px",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"13px"},onClick:loadScores},"⟳ Refresh Scores"));
  return wrap;
}

        awayAbbr: TEAM_ABBR[awayId] || g.teams?.away?.team?.abbreviation || "?",
        awayName: TEAM_NAME[awayId] || g.teams?.away?.team?.teamName || "",
        awayScore: linescore?.teams?.away?.runs ?? g.teams?.away?.score ?? "-",
        homeAbbr: TEAM_ABBR[homeId] || g.teams?.home?.team?.abbreviation || "?",
        homeName: TEAM_NAME[homeId] || g.teams?.home?.team?.teamName || "",
        homeScore: linescore?.teams?.home?.runs ?? g.teams?.home?.score ?? "-",
        status: g.status?.detailedState || g.status?.abstractGameState || "Scheduled",
        inning: linescore?.currentInningOrdinal || null,
        gameTime: g.gameDate ? new Date(g.gameDate).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : null,
      };
    });
    set({scLoading:false,scDone:true,scResults:results});
  } catch(e) {
    set({scLoading:false,scDone:true,scResults:[]});
  }
}

      );

          r.mlbTeam?h("span",{style:{color:C.muted,fontSize:"11px",fontWeight:"700"}},r.mlbTeam):null,

        ));

    });
    wrap.appendChild(list);
  }
  if(S.dbDone) {
    const ok=S.dbResults.filter(r=>r.status.startsWith("✅")).length;
    const warn=S.dbResults.filter(r=>r.status.startsWith("⚠️")).length;
    const err=S.dbResults.filter(r=>r.status.startsWith("❌")).length;
    wrap.appendChild(h("div",{style:{marginTop:"16px"}},
      h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"12px"}},`✅ ${ok} ok · ⚠️ ${warn} no stats · ❌ ${err} not found`),
      h("button",{style:{padding:"8px 18px",borderRadius:"7px",cursor:"pointer",background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontSize:"13px"},onClick:runDebug},"⟳ Run Again")
    ));
  }
  return wrap;
}

async function runDebug() {
  set({dbRunning:true,dbDone:false,dbResults:[]});
  const out=[];
  for(const team of S.teams) {
    for(const p of (team.players||[])) {
      if(!p.name?.trim()) continue;
      try {
        let playerId = PLAYER_IDS[p.name] || null;
        let matchedName = p.name;
        if (!playerId) {
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(p.name)}&sportId=1`);
          const d = await r.json();
          const person = d.people?.[0];
          if(!person){ out.push({name:p.name,fantasyTeam:team.name,status:"❌ Not found",detail:"No player matched this name",hr:null,hbp:null,mlbTeam:null}); set({dbResults:[...out]}); continue; }
          playerId = person.id;
          matchedName = person.fullName;
        }
        const season=new Date().getFullYear();
        const r2=await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`);
        const d2=await r2.json();
        const split=d2.stats?.[0]?.splits?.[0];
        if(!split) out.push({name:p.name,fantasyTeam:team.name,status:"⚠️ No stats yet",detail:`Found as "${matchedName}" but no ${season} stats`,hr:null,hbp:null,mlbTeam:null});
        else out.push({name:p.name,fantasyTeam:team.name,status:"✅ OK",detail:`Matched as "${matchedName}"`,hr:split.stat?.homeRuns??0,hbp:split.stat?.hitByPitch??0,mlbTeam:split.team?.abbreviation??null});
      } catch(e){ out.push({name:p.name,fantasyTeam:team.name,status:"💥 Error",detail:String(e),hr:null,hbp:null,mlbTeam:null}); }
      set({dbResults:[...out]});
    }
  }
  set({dbRunning:false,dbDone:true});
}

// ── Rosters ───────────────────────────────────────────────────────────────────
async function openSpotlight(playerName, fantasyTeam, type) {
  set({spotlightPlayer:{name:playerName, fantasyTeam, type}, spotlightData:null, spotlightLoading:true});
  const playerId = PLAYER_IDS[playerName];
  if(!playerId) { set({spotlightLoading:false, spotlightData:{season:{}, last7:{}, gameLog:[], playerId:null}}); return; }
  const season = new Date().getFullYear();
  try {
    // Fetch season + last7 together — these are stable
    const [sr, lr] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`),
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=lastXGames&group=hitting&season=${season}&sportId=1&limit=7`),
    ]);
    const [sd, ld] = await Promise.all([sr.json(), lr.json()]);
    const season_split = sd.stats?.[0]?.splits?.[0]?.stat || {};
    const last7_split = ld.stats?.[0]?.splits?.[0]?.stat || {};
    // Show modal immediately with season + last7 while game log loads
    set({spotlightLoading:false, spotlightData:{season:season_split, last7:last7_split, gameLog:null, playerId}});
  } catch(e) {
    set({spotlightLoading:false, spotlightData:null});
    return;
  }
  // Fetch game log separately — won't break spotlight if it fails
  try {
    const gr = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&sportId=1`);
    const gd = await gr.json();
    // gameLog splits come back newest-first, take last 3
    const allSplits = gd.stats?.[0]?.splits || [];
    // API returns oldest-first — reverse to get most recent games first, take last 3
    const gameSplits = [...allSplits].reverse().slice(0, 3);
    const gameLog = gameSplits.map(g => ({
      date: g.date || "",
      opponent: g.opponent?.name || "—",
      isHome: g.isHome !== false,
      hr: g.stat?.homeRuns ?? 0,
      hbp: g.stat?.hitByPitch ?? 0,
      hits: g.stat?.hits ?? 0,
      ab: g.stat?.atBats ?? 0,
    }));
    // Merge game log into existing spotlightData
    if(S.spotlightData) {
      set({spotlightData:{...S.spotlightData, gameLog}});
    }
  } catch(e) {
    // Game log failed silently — rest of spotlight still works
    console.warn("Game log fetch failed:", e);
  }
}

function buildProjectedTeamModal() {
  const {team, gamesPlayed, gamesRemaining, paceWeight, projWeight} = S.projectedTeam;
  const TOTAL_GAMES = 162;
  const overlay = h("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1100",padding:"16px"},onClick:()=>set({projectedTeam:null})});
  const modal = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"0",maxWidth:"420px",width:"100%",maxHeight:"88vh",overflowY:"auto"},onClick:e=>e.stopPropagation()});
  const hdr = h("div",{style:{padding:"18px 18px 12px",borderBottom:`1px solid ${C.border}`}});
  hdr.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"4px"}},
    h("div",{},
      h("div",{style:{color:C.text,fontWeight:"800",fontSize:"18px"}},team.name),
      h("div",{style:{color:C.muted,fontSize:"12px",marginTop:"2px"}},team.owner||"")
    ),
    h("button",{style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"20px",lineHeight:"1"},onClick:()=>set({projectedTeam:null})},"✕")
  ));
  hdr.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},
    `${Math.round(projWeight*100)}% preseason · ${Math.round(paceWeight*100)}% pace · ${gamesRemaining} games left`
  ));
  modal.appendChild(hdr);
  const playerProj = (p) => {
    const actual = p.type==="hr" ? (p.effectiveHR||0) : (p.effectiveHBP||0);
    const preseason = p.type === "hbp"
      ? (PRESEASON_HBP_PROJ[p.name] ?? null)
      : (PRESEASON_PROJ[p.name] ?? null);
    // For transaction players, use full season stats for pace
    const baseline = p.addedAt ? (p.type==="hr" ? (p.hrBaseline||0) : (p.hbpBaseline||0)) : 0;
    const totalSeasonStats = actual + baseline;
    let projFinal;
    if(preseason === null) {
      const rate = totalSeasonStats / Math.max(gamesPlayed, 1);
      projFinal = actual + rate * gamesRemaining;
    } else {
      // Blended projection of full season total
      const paceRate = totalSeasonStats / Math.max(gamesPlayed, 1);
      const paceRemaining = paceRate * gamesRemaining;
      const preseasonRemaining = (preseason / TOTAL_GAMES) * gamesRemaining;
      const projSeasonTotal = totalSeasonStats + (paceWeight * paceRemaining) + (projWeight * preseasonRemaining);
      // Display: projected team contribution = season total proj - baseline
      projFinal = projSeasonTotal - baseline;
    }
    const projRounded = Math.round(projFinal);
    // vs pre: compare projected season total vs preseason, shown as team contribution diff
    const projSeasonForDiff = projFinal + baseline;
    const diff = preseason !== null ? Math.round(projSeasonForDiff) - preseason : null;
    let heat = "—";
    if(preseason && preseason > 0) {
      const seasonPace = Math.round((totalSeasonStats / Math.max(gamesPlayed, 1)) * TOTAL_GAMES);
      const pct = (seasonPace - preseason) / preseason;
      if(pct >= 0.20) heat = "🔥🔥🔥";
      else if(pct >= 0) heat = "🔥🔥";
      else if(pct >= -0.20) heat = "🔥";
      else heat = "❄️";
    }
    return { actual, preseason, projFinal: projRounded, diff, heat };
  };
  const colHdr = () => h("div",{style:{display:"flex",alignItems:"center",gap:"4px",padding:"4px 16px",background:C.surface}},
    h("div",{style:{minWidth:"22px"}},""),
    h("div",{style:{flex:"1"}},""),
    h("div",{style:{minWidth:"26px",textAlign:"right",color:C.muted,fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700"}},"now"),
    h("div",{style:{minWidth:"34px",textAlign:"right",color:C.muted,fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700"}},"proj"),
    h("div",{style:{minWidth:"30px",textAlign:"right",color:C.muted,fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700"}},"vs pre")
  );
  const buildSection = (players, typeColor, typeLabel) => {

    modal.appendChild(colHdr());
    const list = h("div",{style:{marginBottom:"6px"}});
    players.forEach((p,i) => {
      const {actual, preseason, projFinal, diff, heat} = playerProj(p);
      const isLast = i === players.length - 1;
      const row = h("div",{class:"row-hover",style:{display:"flex",alignItems:"center",gap:"4px",padding:"8px 16px",borderBottom:isLast?"none":`1px solid ${C.border}22`,cursor:"pointer"},onClick:()=>openSpotlight(p.name,team.name,p.type)});
      row.appendChild(h("div",{style:{minWidth:"22px",fontSize:"13px",lineHeight:"1"}},heat));
      // Headshot
      const pid = PLAYER_IDS[p.name] || null;
      const hsCircle = h("div",{style:{width:"32px",height:"32px",borderRadius:"50%",background:C.bg,border:`1px solid ${typeColor}44`,overflow:"hidden",flexShrink:"0",display:"flex",alignItems:"center",justifyContent:"center"}});
      if(pid) {
        const hsImg = h("img",{style:{width:"100%",height:"100%",objectFit:"cover",objectPosition:"top center"}});
        hsImg.src = `https://img.mlbstatic.com/mlb-photos/image/upload/w_60,q_80/v1/people/${pid}/headshot/67/current`;
        hsImg.onerror = () => { hsCircle.innerHTML = ""; hsCircle.appendChild(h("div",{style:{fontSize:"14px",color:C.muted}},"👤")); };
        hsCircle.appendChild(hsImg);

      if(p.teamAbbr) nameEl.appendChild(h("span",{style:{color:C.muted,fontWeight:"400",fontSize:"11px"}},` (${p.teamAbbr})`));

  buildSection((team.players||[]).filter(p=>p.type==="hbp"&&!p.droppedAt), C.green, "HBP Player");
  const allActive = (team.players||[]).filter(p=>!p.droppedAt);
  const totalProj = allActive.reduce((s,p)=>s+playerProj(p).projFinal, 0);

    h("div",{},
      h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"600"}},"Projected Team Total"),

    ),
    h("span",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"28px",fontWeight:"800"}},totalProj)
  ));
  modal.appendChild(h("button",{style:{width:"calc(100% - 32px)",margin:"0 16px 16px",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"14px"},onClick:()=>set({projectedTeam:null})},"Close"));

  const section = (label, emoji, key, borderTop=true) => {

    hdr.addEventListener("click", () => {
      const cur = S.commishSections || {};
      set({commishSections: {...cur, [key]: !cur[key]}});
    });
    // Accent left bar
    hdr.appendChild(h("div",{style:{
      position:"absolute", left:"0", top:"0", bottom:"0",

  // ════════════════════════════════════════════════════════════════════════

  // ════════════════════════════════════════════════════════════════════════

  lnInp.value = S.leagueName || "DINGERS ONLY";

  });
  lsBody.appendChild(lnInp);

  // Team count
  lsBody.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"8px"}},"Number of Teams"));
  const tcRow = h("div",{style:{display:"flex",alignItems:"center",gap:"12px",marginBottom:"6px"}});

    style:{width:"36px",height:"36px",borderRadius:"8px",cursor:local.length<=2?"default":"pointer",

      color:local.length<=2?C.border:C.red,fontWeight:"800",fontSize:"18px",lineHeight:"1"},
    onClick:()=>{ if(local.length<=2) return; const updated=local.slice(0,local.length-1); set({cpLocal:updated,cpActive:Math.min(S.cpActive,updated.length-1)}); }

        const blankTeams = S.teams.map(t => ({

          players: [],
        }));
        // 2. Wipe draft state
        const blankDraft = { status:"waiting", order:[], picks:[], currentPickIdx:0 };
        // 3. Write to Firebase
        await setDoc(leagueRef, {
          teams: blankTeams,
          draftState: blankDraft,
          draftCodes: null,
          lastUpdated: new Date().toISOString(),
          leagueName: S.leagueName,
        });
        // 4. Delete all transactions
        const txSnap = await getDocs(collection(db, "transactions"));
        const deletes = txSnap.docs.map(d => deleteDoc(doc(db, "transactions", d.id)));
        await Promise.all(deletes);
        // 5. Update local state
        set({
          cpLocal: blankTeams.map(t => ({...t})),
          draftState: blankDraft,
          draftCodes: null,
        });
        resetStatus.textContent = "✓ League reset — ready to redraft.";
        resetStatus.style.color = C.green;
        setTimeout(()=>{ resetStatus.textContent=""; },4000);

        const withTx = applyTransactions(local, S.transactions);

        lsSaveBtn.style.background = C.green;
        setTimeout(()=>{ lsSaveBtn.textContent="💾 Save"; lsSaveBtn.style.background=C.accent; }, 2000);

        setTimeout(()=>{ lsSaveBtn.textContent="💾 Save"; lsSaveBtn.style.background=C.accent; }, 3000);

  // ════════════════════════════════════════════════════════════════════════

  emailWrap.appendChild(h("div",{style:{color:C.muted,fontSize:"10px",marginTop:"3px"}},"Owner signs in with this email to auto-join their team."));
  rsBody.appendChild(emailWrap);

  const hrSub = h("div",{style:{marginBottom:"14px"}});

// Generate a random 4-char alphanumeric code
function genCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join("");
}

// Generate codes for every team and save to Firebase
async function generateDraftCodes() {
  set({draftGenStatus:"Generating codes…"});
  const codes = {};
  S.teams.forEach(t => { codes[String(t.id)] = genCode(); });
  try {
    await setDoc(leagueRef, { draftCodes: codes }, { merge: true });
    set({draftCodes: codes, draftCodesGenerated: true, draftGenStatus:"✅ Codes saved!"});
    setTimeout(()=>set({draftGenStatus:""}), 3000);
  } catch(e) {
    console.error("generateDraftCodes error:", e);
    set({draftGenStatus:"❌ Failed to save codes: " + e.message});
  }
}

// Initialize a new draft in Firebase
async function initDraft(numRounds, format="snake") {
  if(!S.teams.length) { alert("No teams loaded yet."); return; }
  // Save seasonStartDate to league doc before starting draft (locks it in)
  if(leagueRef) {
    await setDoc(leagueRef, {seasonStartDate: S.seasonStartDate || null}, {merge:true});
  }
  // Randomize team order — no structural first-pick advantage
  const teamIds = [...S.teams.map(t=>t.id)].sort(() => Math.random() - 0.5);
  const order = [];
  for(let r=0; r<numRounds; r++) {
    // Snake: odd rounds reverse; Linear: always same direction
    const round = (format==="snake" && r % 2 === 1) ? [...teamIds].reverse() : [...teamIds];
    round.forEach(id => order.push({round: r+1, teamId: id}));
  }
  const state = {
    status: "active",
    numRounds,
    format,
    order,
    currentPickIdx: 0,
    picks: [],
    startedAt: new Date().toISOString(),
  };
  try {
    await setDoc(leagueRef, { draftState: state }, { merge: true });
    set({draftGenStatus:"✓ Draft started!"});
  } catch(e) {
    console.error("initDraft error:", e);
    alert("Failed to start draft: " + e.message);
  }
}

// Claim a team slot with a code
function claimTeamByCode(code) {
  if(!S.draftCodes) { set({draftCodeError:"No draft codes found. Ask the commissioner."}); return; }
  const upper = code.trim().toUpperCase();
  const entry = Object.entries(S.draftCodes).find(([,v]) => v === upper);
  if(!entry) { set({draftCodeError:"Invalid code. Double-check with your commissioner."}); return; }
  const teamId = parseInt(entry[0]);
  localStorage.setItem("draftTeamId", String(teamId));
  set({draftMyTeamId: teamId, myTeamId: teamId, draftCodeError:""});
}

// Search MLB API for players
async function searchDraftPlayers(query) {
  if(!query.trim()) { set({draftSearchResults:[]}); return; }
  set({draftSearchLoading:true});
  try {
    const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(query)}&sportId=1&active=true`);
    const d = await r.json();
    const people = (d.people || []).slice(0, 8);
    // Filter out already-drafted players
    const takenNames = new Set(
      (S.draftState?.picks||[]).map(p=>p.player.name)
    );
    const results = people
      .filter(p => !takenNames.has(p.fullName))
      .map(p => ({id:p.id, name:p.fullName, position:p.primaryPosition?.abbreviation||"", team:p.currentTeam?.name||""}));
    set({draftSearchResults:results, draftSearchLoading:false});
  } catch(e) {
    set({draftSearchResults:[], draftSearchLoading:false});
  }
}

// Commit a pick to Firebase
async function commitPick(player, type) {
  const ds = S.draftState;
  if(!ds || ds.status !== "active") return;
  const pick = ds.order[ds.currentPickIdx];
  if(!pick) return;
  // Fetch team abbr for the player
  let teamAbbr = null;
  try {
    const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${player.id}/stats?stats=season&group=hitting&season=${new Date().getFullYear()}&sportId=1`);
    const d = await r.json();
    teamAbbr = d.stats?.[0]?.splits?.[0]?.team?.abbreviation || null;
  } catch(e) {}

  const newPick = {
    pickIdx: ds.currentPickIdx,
    round: pick.round,
    teamId: pick.teamId,
    player: {name:player.name, id:player.id, teamAbbr},
    type,
    pickedAt: new Date().toISOString(),
  };
  const newPicks = [...(ds.picks||[]), newPick];
  const nextIdx = ds.currentPickIdx + 1;
  const isDone = nextIdx >= ds.order.length;

  const update = {
    ...ds,
    picks: newPicks,
    currentPickIdx: nextIdx,
    status: isDone ? "complete" : "active",
  };

  try {
    await setDoc(leagueRef, { draftState: update }, { merge: true });
    // If draft complete, write rosters to Firebase
    if(isDone) await writeDraftRostersToFirebase(newPicks);
    try { logEvent(analytics, "draft_pick", {player: player.name, type, round: newPick.round}); } catch(e) {}
    set({draftConfirming:null, draftSearch:"", draftSearchResults:[], draftPickType:"hr"});
  } catch(e) {
    console.error("commitPick error:", e);
    alert("Pick failed: " + e.message);
  }
}

// After draft completes, write rosters to the league/data Firebase doc
async function writeDraftRostersToFirebase(picks) {
  const teams = S.teams.map(t => {
    const teamPicks = picks.filter(p=>p.teamId===t.id);
    const players = teamPicks.map(p => ({
      name: p.player.name,
      type: p.type,
      teamAbbr: p.player.teamAbbr || null,
      effectiveHR: 0,
      effectiveHBP: 0,
      hrBaseline: null,
      hbpBaseline: null,
      addedAt: null,
      droppedAt: null,
    }));
    return {...t, players, hasUsedTransaction: false};
  });
  const now = new Date().toISOString();
  await setDoc(leagueRef, {teams, leagueName: S.leagueName, lastUpdated: now});
}
